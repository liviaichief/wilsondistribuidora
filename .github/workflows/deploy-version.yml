name: Auto Increment Version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    # Evita loop infinito se a mensagem do commit já for de incremento
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run version bump script
        run: node bump_version.cjs

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/version.js
          # Captura a nova versão para a mensagem de commit
          NEW_VERSION=$(node -e "console.log(require('fs').readFileSync('src/version.js', 'utf8').match(/V\d+\.\d+\.\d+/)[0])")
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
